<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SnapAsk" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>SnapAsk</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --muted: #888;
      --accent: #7c6ef5;
      --accent-dim: rgba(124,110,245,0.15);
      --accent-glow: rgba(124,110,245,0.4);
      --radius: 20px;
      --radius-sm: 12px;
    }
    html, body {
      height: 100%; background: #000; color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none; overflow: hidden;
    }
    #app { width: 100%; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    #camera-layer { position: absolute; inset: 0; z-index: 0; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #canvas { display: none; }
    .cam-gradient-top {
      position: absolute; top: 0; left: 0; right: 0; height: 160px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      z-index: 2; pointer-events: none;
    }
    .cam-gradient-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 340px;
      background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
      z-index: 2; pointer-events: none;
    }
    .ui-layer {
      position: absolute; inset: 0; z-index: 3;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    }
    .header { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; color: #fff; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent-glow); }
    .clear-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: none;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; cursor: pointer;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .spacer { flex: 1; }
    .bottom { padding: 0 20px 10px; display: flex; flex-direction: column; gap: 16px; }
    .answer-card {
      background: rgba(20,20,20,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      overflow: hidden; max-height: 38vh;
      display: flex; flex-direction: column;
      animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .answer-header {
      padding: 11px 14px; display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
    }
    .answer-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 6px var(--accent-glow); flex-shrink: 0; }
    .answer-label { font-size: 12px; font-weight: 500; color: var(--muted); flex: 1; }
    .answer-close {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: none;
      color: var(--muted); font-size: 12px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .answer-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
    .answer-body { padding: 14px; font-size: 14px; line-height: 1.75; color: #e8e8e8; white-space: pre-wrap; word-break: break-word; }
    .suggestions { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; scrollbar-width: none; }
    .suggestions::-webkit-scrollbar { display: none; }
    .chip {
      padding: 8px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; font-size: 13px;
      color: rgba(255,255,255,0.75); cursor: pointer;
      white-space: nowrap;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .chip:active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
    .snap-row { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 4px 0; }
    .side-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: #fff; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
    }
    .snap-btn {
      width: 76px; height: 76px; border-radius: 50%;
      background: #fff; border: 4px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .snap-btn:active { transform: scale(0.93); }
    .snap-btn.loading { background: var(--accent); border-color: var(--accent-dim); }
    .snap-inner { width: 58px; height: 58px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .snap-btn.loading .snap-inner { background: transparent; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .no-cam {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; background: var(--bg); z-index: 1; text-align: center; padding: 40px;
    }
    .no-cam-icon { font-size: 48px; }
    .no-cam h2 { font-size: 18px; font-weight: 500; }
    .no-cam p { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .allow-btn { margin-top: 8px; padding: 13px 28px; background: var(--accent); border: none; border-radius: 30px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
    .error-card { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: #f87171; line-height: 1.6; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .flash { position: absolute; inset: 0; background: #fff; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.08s; }
    .flash.active { opacity: 0.7; }
    #gallery-input { display: none; }
  </style>
</head>
<body>
<div id="app">
  <div id="camera-layer">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <div class="flash" id="flash"></div>
  <div class="cam-gradient-top"></div>
  <div class="cam-gradient-bottom"></div>
  <div class="no-cam" id="no-cam" style="display:none">
    <div class="no-cam-icon">📷</div>
    <h2>Camera access needed</h2>
    <p>SnapAsk needs your camera to work. Tap below and allow access when Safari asks.</p>
    <button class="allow-btn" onclick="startCamera()">Allow Camera</button>
  </div>
  <div class="ui-layer">
    <div class="header">
      <div class="logo"><div class="logo-dot"></div>SnapAsk</div>
      <button class="clear-btn" onclick="clearAnswer()">✕</button>
    </div>
    <div class="spacer"></div>
    <div class="bottom">
      <div id="answer-area"></div>
      <div class="suggestions" id="suggestions" style="display:none">
        <div class="chip" onclick="followUp('Explain this step by step in simple terms')">Step by step</div>
        <div class="chip" onclick="followUp('Give me a shorter simpler answer')">Simplify</div>
        <div class="chip" onclick="followUp('Give me a similar example problem')">Example</div>
        <div class="chip" onclick="followUp('Why is this the answer?')">Why?</div>
        <div class="chip" onclick="followUp('Summarize this in one sentence')">Summarize</div>
      </div>
      <div class="snap-row">
        <button class="side-btn" onclick="triggerGallery()">🖼️</button>
        <div class="snap-btn" id="snap-btn" onclick="snap()">
          <div class="snap-inner" id="snap-inner">✦</div>
        </div>
        <button class="side-btn" onclick="flipCamera()">🔄</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="gallery-input" accept="image/*" onchange="handleGallery(this)" />
<script>
  const GEMINI_KEY = 'AIzaSyBsYHMPkQKjBABD9ZxarSlpuA0MCJ6liFw';
  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
  let stream = null, facingMode = 'environment', lastImageB64 = null, lastMime = 'image/jpeg', isLoading = false;

  async function startCamera() {
    document.getElementById('no-cam').style.display = 'none';
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
      document.getElementById('video').srcObject = stream;
    } catch(e) { document.getElementById('no-cam').style.display = 'flex'; }
  }

  async function flipCamera() { facingMode = facingMode === 'environment' ? 'user' : 'environment'; await startCamera(); }
  function triggerGallery() { document.getElementById('gallery-input').click(); }

  function handleGallery(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => { const b64 = e.target.result.split(',')[1]; askGemini(b64, file.type || 'image/jpeg'); };
    reader.readAsDataURL(file); input.value = '';
  }

  function snap() {
    if (isLoading) return;
    const video = document.getElementById('video'), canvas = document.getElementById('canvas');
    if (!stream || !video.videoWidth) return;
    const flash = document.getElementById('flash');
    flash.classList.add('active'); setTimeout(() => flash.classList.remove('active'), 150);
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    if (facingMode === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(video, 0, 0);
    const b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
    askGemini(b64, 'image/jpeg');
  }

  async function askGemini(b64, mimeType, extraText) {
    if (isLoading) return;
    isLoading = true; lastImageB64 = b64; lastMime = mimeType;
    setLoading(true);
    const prompt = extraText || 'Look at this image and answer or explain what is being asked or shown. If it is a math problem, solve it step by step. If it is text, summarize or answer it. If it is a question, answer it clearly. Be concise and direct.';
    try {
      const res = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ inline_data: { mime_type: mimeType, data: b64 } }, { text: prompt }] }], generationConfig: { maxOutputTokens: 800, temperature: 0.3 } })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No answer found.';
      showAnswer(text);
    } catch(e) { showError(e.message); }
    setLoading(false); isLoading = false;
  }

  function followUp(prompt) { if (lastImageB64) askGemini(lastImageB64, lastMime, prompt); }

  function setLoading(on) {
    const btn = document.getElementById('snap-btn'), inner = document.getElementById('snap-inner');
    if (on) { btn.classList.add('loading'); inner.innerHTML = '<div class="spinner"></div>'; document.getElementById('answer-area').innerHTML = ''; document.getElementById('suggestions').style.display = 'none'; }
    else { btn.classList.remove('loading'); inner.innerHTML = '✦'; }
  }

  function showAnswer(text) {
    document.getElementById('answer-area').innerHTML = `<div class="answer-card"><div class="answer-header"><div class="answer-dot"></div><span class="answer-label">AI Answer</span><button class="answer-close" onclick="clearAnswer()">✕</button></div><div class="answer-scroll"><div class="answer-body">${escapeHtml(text)}</div></div></div>`;
    document.getElementById('suggestions').style.display = 'flex';
  }

  function showError(msg) { document.getElementById('answer-area').innerHTML = `<div class="error-card">⚠️ ${escapeHtml(msg)}</div>`; }
  function clearAnswer() { document.getElementById('answer-area').innerHTML = ''; document.getElementById('suggestions').style.display = 'none'; lastImageB64 = null; }
  function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  startCamera();
</script>
</body>
</html>
